<svg
  xmlns="http://www.w3.org/2000/svg"
  width="1200"
  height="1200"
  viewBox="0 0 120 120"
  fill="none"
>
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#7c3aed" />
      <stop offset="50%"  stop-color="#9333ea" />
      <stop offset="100%" stop-color="#c026d3" />
    </linearGradient>

    <linearGradient id="ring-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#818cf8" stop-opacity="0.6" />
      <stop offset="100%" stop-color="#f472b6" stop-opacity="0.3" />
    </linearGradient>

    <filter id="inner-glow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#a855f7" flood-opacity="0.7" />
    </filter>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="60" cy="60" r="57" fill="none" stroke="url(#ring-grad)" stroke-width="1.5" opacity="0.5" />

  <!-- Main circle with gradient fill -->
  <circle cx="60" cy="60" r="52" fill="url(#bg-grad)" filter="url(#inner-glow)" />

  <!-- Subtle inner highlight -->
  <ellipse cx="60" cy="38" rx="28" ry="16" fill="white" opacity="0.08" />

  <!-- JN text -->
  <text
    x="60"
    y="77"
    text-anchor="middle"
    font-family="'Arial Black', 'Helvetica Neue', Arial, sans-serif"
    font-weight="900"
    font-size="36"
    letter-spacing="-1"
    fill="white"
    opacity="0.97"
  >JN</text>
</svg>
